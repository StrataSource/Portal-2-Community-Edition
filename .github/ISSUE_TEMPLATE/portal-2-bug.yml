name: Portal 2 Compat Bug Report
description: Submit a bug report related to the Portal 2 campaign in P2CE
title: "Portal 2 Compat Bug: <Title>"
labels: ["Type: Bug", "Compat: Portal 2"]
body:
- type: textarea
  attributes:
    label: Describe the bug
    description: A clear description of what the bug is. Feel free to add pictures or videos (They really help!)
    placeholder: |
      When I do X then Y happens.
  validations:
    required: true
- type: textarea
  attributes:
    label: To Reproduce
    description: Steps to reproduce the behavior
    placeholder: |
      1. Open map ...
      2. Do ...
      3. See error
  validations:
    required: true
- type: textarea
  attributes:
    label: Currently Downloaded Addons & Mounted Content
    description: Please run the `workshop_list` and `path` commands in the Console and paste their outputs here please.
    placeholder: |
      Run `workshop_list` and `path`, paste the outputs here.
  validations:
    required: true
- type: input
  attributes:
    label: Operating System
    description: (Optional&#58; Only if OS Specific)
  validations:
    required: false
